  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0.47" y2="1">
      <stop offset="0" stop-color="#63c483"/>
      <stop offset="1" stop-color="#3a8455"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="23" fill="url(#tile)"/>
  <svg x="13" y="22" width="74" height="55" viewBox="0 0 140 104" overflow="visible" fill="none">
