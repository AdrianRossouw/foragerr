<!-- Favicon: a SIMPLIFIED ant-in-speech-bubble for 16px browser tabs. The
     detailed vector mark (LogoMarkIcon) turns to mud at tab size, so the tab
     glyph drops the comic and interior detail to a bold filled bubble with a
     clean ant silhouette knocked out — recognizable on light and dark tabs.
     Keep in step with the brand accent (#57b877) and app-surface dark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Foragerr">
  <path d="M32 60 L26 80 L48 62 Z" fill="#57b877"/>
  <rect x="14" y="12" width="72" height="54" rx="18" fill="#57b877"/>
  <ellipse cx="40" cy="40" rx="12" ry="9" fill="#202020"/>
  <circle cx="54" cy="39" r="5.5" fill="#202020"/>
  <circle cx="65" cy="35" r="8.5" fill="#202020"/>
  <circle cx="67" cy="33" r="2.6" fill="#57b877"/>
  <g fill="none" stroke="#202020" stroke-width="3.2" stroke-linecap="round">
    <path d="M71 27 Q79 19 76 13"/>
    <path d="M74 29 Q82 23 81 17"/>
  </g>
  <g fill="none" stroke="#202020" stroke-width="3.4" stroke-linecap="round">
    <path d="M48 47 L44 58"/>
    <path d="M58 46 L62 58"/>
  </g>
</svg>
