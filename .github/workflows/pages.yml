# Build and deploy the public site to GitHub Pages (FRG-SITE-005).
#
# Every fact on the site is generated from repository artifacts by
# site/build.py, which fails the job on any missing or inconsistent source —
# a broken build deploys nothing. Actions are pinned to full commit SHAs and
# the job carries only the permissions Pages deployment requires; these two
# properties are asserted by backend/tests/site/test_site_build.py.
#
# One-time repo setting (not expressible here): Settings → Pages →
# Source = "GitHub Actions".

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # site/build.py cross-checks CHANGELOG entries against tags

      - name: Build site from repository artifacts
        run: python3 site/build.py --out _site

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
